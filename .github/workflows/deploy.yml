name: Build and deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4
  
      #uses package-lock.json cache for node_modules
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      #build the frontend
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      #set up python & install dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Import-check backend
        working-directory: backend
        run: python -c "import main"

  deploy:
    name: Deploy to server
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:

    #uses SSH deploy to perform the following on the remote
    # git fetch origin main, git reset --hard origin/main
    # docker compose up -d --build.
    #docker image prune -f

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
