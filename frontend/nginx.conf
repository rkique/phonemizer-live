server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets (hashed filenames from the Vite build) can be cached
    # aggressively; index.html itself must not be, so a redeploy is picked
    # up immediately instead of being served stale from a client cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
